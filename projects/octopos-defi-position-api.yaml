title: OctoPos - DeFi Position API
other_names: null
parent: null
description: "As the first institutional vault infrastructure provider on Stellar, we have been working on portfolio position tracking and net asset value calculation. Our portfolio NAV module enables vault curators to have real-time, accurate PnL and share price calculation for their vaults. We are working with Thaw Capital (Indentura), Stake Capital, Gami Capital and soon Sentora on their first-ever vaults on Stellar.  \n  \nWith this project, we are making this institutional-grade infrastructure available to anyone on Stellar. Anyone can query their portfolio value down to individual position level with just a G or C address.\n\nWe solved multiple issues in building this tool. For example, Blend values dToken (debt) at a different USD price from that of Aquarius. Whilst this is ok for Blend as they only need to care about XLM amount when users repay, it creates mismatch portfolio PnL in USD terms. So consistent pricing source/oracle is important in position valuation.\_\_\n\nFrom this foundation, we can extend/build OctoPos in much less than 10 weeks.  \n  \nOctoPos - think of it as \"DeBank\" for Stellar."
