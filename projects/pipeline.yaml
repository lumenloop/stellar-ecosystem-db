title: Pipeline
other_names:
  - Commodity Trade Finance Protocol
parent: null
description: Decentralized commodity trade finance platform that generates on-chain yield from asset-backed commodity financing trades. Pipeline targets the ~$2.5 trillion trade finance gap — widened by Basel III regulatory changes that made short-duration commodity-backed lending to mid-market traders uneconomic for banks — by providing institutional-grade rails for digital asset investors to access high, asset-backed yield with short duration (30–180 days). Built on Soroban/Stellar with institutional custody (BitGo), KYC/AML screening, and a 3-of-5 Risk Council multisig governance structure.
