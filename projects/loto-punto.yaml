title: Loto Punto
other_names:
  - 'Loto Punto: Automated Remmitance Kiosks'
parent: null
description: |
  Loto Punto kiosks enable easy and affordable self-service transactions in cash within seconds, providing a fast, easy, and inexpensive way to pay, send and receive money. By integrating Stellar Blockchain with Loto Punto’s micro- service-oriented architecture system, we'll offer a more convenient an inexpensive channel for cross border remittances. This is achieved by converting physical FIAT currency into cryptocurrency and vice versa, partnering with relevant Stellar Wallets that provide on-ramp and off-ramp services in each LATAM country. 
