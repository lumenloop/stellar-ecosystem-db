title: MPCVault Stellar Integration
other_names: null
parent: null
description: |-
  MPCVault is an institutional-grade MPC (Multi-Party Computation) wallet platform seeking to integrate natively with the Stellar Network. Our objective is to bring enterprise-level custody infrastructure to the Stellar ecosystem, enabling organizations to securely manage XLM and Stellar-issued assets with institutional controls.

  The integration will deliver the following:

   Core wallet support for XLM and issues assets with trustlines, send/recieve functionality, memo support, and balance tracking
      
   Complete transaction history display including pending and failed transactions
      
   Transaction simulation prior to signing/submission
      
   Automatic asset detection via balances/trustlines
      
   Real-time price feed integration via on-chain and CoinGecko data
      
   MPCVault wallet plugin/connector compatibility with Stellar Classic and Soroban signing flows
      
   Soroban smart contract support with policy gating (allowlists, limits, approvals).
