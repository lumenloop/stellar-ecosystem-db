title: Seasonal Workers Payroll
other_names: null
parent: null
description: |-
  More than 169 million migrant workers move across borders for temporary jobs in sectors such as agriculture, construction, tourism, and seasonal retail. Financial inclusion data shows that roughly 30% of migrant and temporary workers remain unbanked, meaning over 50 million workers globally still receive wages in cash because they cannot access local bank accounts. With typical earnings of $6,000 per year in seasonal labor markets, this represents more than $300 billion annually distributed through inefficient and risky cash payroll systems.

  TuCambio digitizes payroll for these workers. Employers generate payroll in our platform and workers receive wages in on-chain wallets built on Stellar, with balances held in stablecoins and connected via API to Web3-linked debit cards, allowing purchases or ATM withdrawals directly from wallet balances. Workers can also send cross-border remittances through TuCambio.

  TuCambio enables companies to transition payroll from cash to a secure digital system.
