description: XOXNO is an enterprise-grade decentralized lending protocol built on Stellar's Soroban smart contract platform. It opens up advanced on-chain capital strategies to more market participants through a clean and intuitive UI/UX, with plans to integrate RWA markets. Core features include eMode-style capital efficiency optimizations for correlated assets, looping strategies, leveraged long/short exposure via native aggregator integrations, flash loans, isolated liquidity pools with independent risk profiles, NFT-based position management, and multi-source oracle protection. The team previously built and scaled the XOXNO DeFi platform on MultiversX since 2021, serving 100,000+ users and processing $40M in on-chain marketplace volume.
