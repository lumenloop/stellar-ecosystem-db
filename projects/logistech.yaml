description: |
  We are an existing payment processor with clients such as cruises, hotels and hostels. These users often have to pay high fees at check-out. By integrating Stellar we want to decrease these fees and offer an easy to use way to check-out at lower fees. We will be integrating through the Beans merchant SDK, making use of their global on-ramps and check-out API to abstract crypto away for our customers. 
