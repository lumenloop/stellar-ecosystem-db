description: Drips is an open-source funding protocol offering continuous payment streams, dependency funding, Drip Lists, and RetroPGF distribution for software projects. On Stellar, Drips powers Drips Wave — a recurring monthly bounty cycle where developers compete to contribute to open-source Stellar ecosystem projects and earn on-chain rewards, while maintainers run transparent, time-bound funding rounds.
