title: 'Wirex - Vottun Stellar SDK: A Scalable Development Framework'
other_names: null
parent: null
description: 'Wirex, in collaboration with Vottun as its development partner, proposes the creation of a modular and reusable SDK for the Stellar ecosystem. The objective is to simplify the integration of Wirex’s payment capabilities into Stellar-based applications, reducing technical complexity and lowering barriers for developers. The SDK will abstract underlying protocol complexity while maintaining flexibility, allowing teams to focus on product development instead of infrastructure. Its modular and extensible architecture will support diverse use cases, including wallets, fintech products, and enterprise payment flows. The SDK will include six core modules: wallet management, smart contract interaction, transaction creation and lifecycle management, a unified API client, real-time WebSocket subscriptions, and centralized configuration. By combining Wirex’s production-grade payment infrastructure with Vottun’s experience in building blockchain SDKs, the initiative aims to accelerate developer adoption, increase network usage, and strengthen the Stellar ecosystem.'
