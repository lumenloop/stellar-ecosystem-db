parent: null
description: Sentinel Protocol is a parametric insurance framework built on the Soroban blockchain, enabling trustless, automated coverage through smart contracts and decentralized oracles. It can support insurance in any vertical with a reliable data source. The first vertical we are building is flight delay insurance, which offers travelers automatic payouts if a flight is delayed beyond a set threshold, with no claims process or approvals.
