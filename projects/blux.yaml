description: |
  Blux is a connect kit designed to make integrating decentralized applications (dApps) with wallets, email, and phone authentication seamless. Built with a focus on the Stellar ecosystem, it enhances user onboarding and engagement while simplifying development.  We provide developers with easy-to-use tools and customizable modals that speed up integration and improve user retention. Blux supports multiple wallets, including cold wallets, as well as login options via email, phone, and OAuth (Google/Apple), striking a balance between accessibility, security, and flexibility.  Our goal is to be the go-to solution for developers building on Stellar and beyond, bridging the gap between traditional user experiences and blockchain technology.
