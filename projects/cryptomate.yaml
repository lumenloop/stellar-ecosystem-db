parent: null
description: CryptoMate is a white-label fintech platform that enables community leaders, entrepreneurs, and SMEs to launch, run, and monetize their own financial services on Stellar. Its flagship integration allows cash-economy users in LATAM and Africa to walk into any MoneyGram location, deposit cash, and receive a virtual VISA card push-provisioned into Apple Pay or Google Wallet — with USDC settlement on Stellar via MoneyGram Ramps happening invisibly underneath. End users never interact with a wallet address or stablecoin.
