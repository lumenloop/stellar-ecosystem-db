parent: null
description: Nectar Network is a generalized automation and liquidation layer for Soroban DeFi. Any protocol can register time-sensitive on-chain tasks — liquidations, auto-compounding, oracle updates, rebalancing — executed reliably by keepers competing for rewards. Supports Blend liquidations, FxDAO CDPs, DeFindex rebalancing, and oracle refreshes. Open-sourced as public-good infrastructure for the entire Stellar ecosystem.
