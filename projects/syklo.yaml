description: |
  We are integrating decentralized yield into a P2P wallet using the Blend lending protocol on Stellar. Wallet balances are typically idle; this feature lets users opt in to supply USDC to on-chain lending pools and earn interest from borrowers.

  The objective is to:

  *Enable passive yield on USDC without leaving the wallet

  *Keep the experience simple for non-DeFi users

  *Maintain user custody and on-chain transparency

  *Increase wallet engagement and capital efficiency
