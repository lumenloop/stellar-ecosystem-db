description: Non-custodial capital protection strategies on Stellar, implemented as SEP-56 tokenized vaults built on Soroban smart contracts. Cushion dynamically rebalances between risky Stellar assets (including digital assets and RWAs) and stablecoins using a CPPI (Constant Proportion Portfolio Insurance) model, preserving a predefined downside protection floor while optimizing performance.
