title: iOS Mac Stellar SDK
other_names: null
parent: null
description: A native Swift SDK for building Stellar-powered iOS and macOS applications. Enables developers to interact with the Stellar network, manage accounts, submit transactions, and build on Soroban smart contracts. Developed and maintained by Soneso (Christian Rogobete), it won first place in the 2018 Stellar Build Challenge and is supported by the SCF Public Goods program.
