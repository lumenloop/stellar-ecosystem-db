parent: null
description: WarpDrive is a high-security execution framework that brings verifiable off-chain automation to the Stellar ecosystem. It integrates the proven WAVS execution model — a WASM runtime backed by Eigenlayer AVS operator set — with Stellar and Soroban. WarpDrive allows external services, bots, and demanding workloads such as cross-chain orchestration, custom oracles, and GPU-level computation to run with the same trust guarantees as on-chain logic. Use cases include prediction markets powered by custom oracles, automated treasury and trading strategies, and EVM bridge connectivity.
