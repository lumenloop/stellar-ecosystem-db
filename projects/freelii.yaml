description: |
  Freelii is a rebranding of our project Strooper Wallet. This project is a noncustodial Stellar wallet leveraging passkeys for enhanced security and ease of use. Freelii was originally built on Telegram as a chatbot for remittances. We have been gathering constant customer feedback and now created a B2B2C business model integrating core features our prospective merchants are looking for. 
