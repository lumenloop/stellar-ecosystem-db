description: Microvault is an on-chain microlending engine built on Stellar's Soroban smart contract platform, leveraging the ERC-4626 Vault Standard to deliver affordable credit to smallholder farmers. It provides direct access to credit for an existing 50,000-farmer base and enables financial institutions, cooperatives, and lending entities to deploy their own instances of the lending engine — expanding last-mile agricultural financing through low-cost, transparent on-chain transactions.
