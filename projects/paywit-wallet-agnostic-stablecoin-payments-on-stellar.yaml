title: Paywit – Wallet-Agnostic Stablecoin Payments on Stellar
other_names: null
parent: null
description: |-
  Paywit is a wallet-agnostic payment layer enabling merchants to accept stablecoin payments on Stellar without integrating individual wallets or managing blockchain complexity.

  Problem: Accepting Stellar payments requires handling wallet-specific signing flows, SEP standards, and deeplinks — complexity that prevents broader merchant adoption.

  Solution: Paywit provides hosted checkout and drop-in SDKs that abstract wallet complexity. Merchants integrate once; users pay from any Stellar wallet. Funds settle directly to merchant wallets — fully non-custodial.

  How it works:

   Developer integrates Paywit SDK
      
   App requests payment session
      
   Paywit generates hosted checkout with wallet options
      
   User pays via preferred Stellar wallet (SEP-7)
      
   Funds go directly to merchant wallet (non-custodial)
      
   Paywit verifies via Horizon and notifies merchant
      

  Why Stellar needs this: Paywit positions Stellar as the payment rail for commerce — like Stripe Checkout. By removing wallet integration burden, it unlocks broader merchant adoption.
