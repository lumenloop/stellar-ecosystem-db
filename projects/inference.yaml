description: |
  Inference is designed as a domain‑specific formal specification language for Web3 native applications. Designed for WASM based infrastructure, Stellar is the ideal  ecosystem to apply both our expertise & inference. Its syntax is concise and Rust‑like, and it aims to let developers write formal specifications and correctness proofs in a way that resembles writing unit tests. Inference seeks to bridge the gap between theorem proving and practical application development in blockchains. This approach provides a path to integrate formal verification into the development process for Soroban developers.
