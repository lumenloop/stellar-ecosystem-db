description: Bloccpay is a global payroll and payments platform that enables businesses to pay remote contractors worldwide—with a focus on Africa—in USDC on Stellar. It offers automated batch payroll via the Stellar Disbursement Platform (SDP), contractor invoicing payable through Stellar Wallets Kit, and local fiat off-ramp to bank accounts and mobile money in Nigeria, Kenya, and Ghana.
