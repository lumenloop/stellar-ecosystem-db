title: Hurupay
other_names:
  - Hurupay Virtual Accounts Program
parent: null
description: |
  Hurupay proposes to launch a virtual accounts program for freelancers, remote workers and businesses that will leverage the USDC stablecoin on Stellar as the underlying infrastructure. The goal is to provide these users with a dedicated US account and routing number in their name to accept payroll from platforms like Deel and Remote, or payouts from services like YouTube, Spotify, and TikTok.This functionality will operate as follows: Each remote worker will have their virtual account linked to their Stellar wallet address. An employer in the US will make USD payment to the virtual account and the payment is settled into the user's wallet as USDC stablecoin. Users can then decide to hold their funds in stablecoins on their wallets or quickly and easily offramp local currency.  
