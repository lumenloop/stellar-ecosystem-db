description: 'Novatti is an Australian payments company (ASX: NOV) that delivers payment solutions enabling businesses to accept Visa, Mastercard, Amex, Apple Pay, Alipay, WeChat Pay and more. On Stellar, Novatti issued AUDD — an Australian Dollar stablecoin that surpassed $1 billion in on-chain transactions in 2025.'
