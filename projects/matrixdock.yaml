description: Matrixdock is Asia's leading real-world asset (RWA) tokenization platform, bringing institutional-grade assets on-chain through fully allocated, transparent, and verifiable structures. Products include XAUm (tokenized gold) and XAGm (tokenized silver), each backed 1:1 by LBMA-accredited bullion, and STBT, a tokenized short-term U.S. Treasury Bill designed for on-chain liquidity and collateral use. Matrixdock is building the reserve layer for on-chain capital markets.
