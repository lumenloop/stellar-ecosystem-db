description: Piggy is a global family finance app that helps kids learn to save, earn, and grow money through gamified chores, savings goals, and parent-approved rewards. Parents keep full control (permissions, limits, approvals), while kids get a simple, motivating experience that builds real money habits. Piggy is designed to be a borderless wealth-building account for Gen Alpha, using stablecoins as the foundation for low-friction deposits, transparent balances, and (optional) yield-powered savings, while keeping the product UX-first and family-safe.
