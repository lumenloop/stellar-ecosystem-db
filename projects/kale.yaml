description: $KALE is a proof-of-teamwork farming game on Stellar's Soroban smart contracts, where farmers collaborate to mine tokens with rewards distributed by individual contribution. Created by Tyler van der Hoeven (@kalepail) in November 2024, it became a major Stellar ecosystem phenomenon, stress-testing Soroban scalability and spawning composability projects like Kalefail and KALE Grab Rush.
