description: SurgePay is a comprehensive fintech platform enabling seamless cross-border payments and financial services for users across Africa. Built on the Stellar blockchain, it provides instant, low-cost international transfers, multi-currency digital wallets, virtual dollar cards, and tag-based payments. The platform bridges traditional banking infrastructure and blockchain technology, supporting USDC stablecoin transfers, tiered KYC verification, and multiple fiat on/off ramps — making global money movement accessible, affordable, and instant for everyday users.
