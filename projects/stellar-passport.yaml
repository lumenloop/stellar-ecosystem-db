description: Stellar Passport transforms event attendance and community activity into meaningful, long-term engagement with the Stellar ecosystem. With a single QR scan at a booth, workshop, meetup, or online event, users create a passkey-secured wallet and identity in seconds. From there, they can move through curated challenges, workshops, or learning tracks that verify their participation and track their progress.
