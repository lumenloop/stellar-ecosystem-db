title: Lumexo
other_names:
  - Lumexo Android & iOS App
parent: null
description: Lumexo is a non-custodial financial interface built on the Stellar network that unifies decentralized finance tools into a single, accessible system while preserving full self-custody and direct on-chain interaction. The current implementation includes a browser-based Stellar wallet with native SDEX trading, asset management, liquidity pools, lending via Soroban smart contracts (Blend), and fiat on-ramp integration through Transak. Users can trade, manage liquidity, access lending, and perform payments in one coherent interface, reducing ecosystem fragmentation and lowering the barrier to entry.  The next phase includes native iOS and Android apps and expanded Soroban integrations to support additional protocols. Lumexo's long-term goal is to strengthen Stellar's DeFi ecosystem by providing stable, user-first infrastructure that connects wallets, trading, liquidity, lending, and future tokenized financial tools.
