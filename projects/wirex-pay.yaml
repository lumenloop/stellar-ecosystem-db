description: Wirex Pay is a self-custodial card and bank account payment solution powered by smart accounts. It already has a solution designed for EVM and TRON solution is being developed. The team would like to support Stellar too. Supported by Visa, Wirex Pay aligns closely with Visa's vision for the future of payments, emphasizing collaboration in driving fintech innovation.
