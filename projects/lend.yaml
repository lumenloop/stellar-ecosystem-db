description: Lend is building compliant infrastructure for tokenized real estate on-chain, connecting global digital capital with high-yielding real estate operations through legally structured, asset-backed tokens. Users can invest stablecoins into professionally originated deals targeting 8–15% APR, with programmable yield distribution and secondary market liquidity. By integrating with Stellar, Lend leverages its fast, low-cost settlement layer to issue and manage tokenized real estate assets efficiently, enabling DeFi composability, cross-border access, and scalable compliance.
