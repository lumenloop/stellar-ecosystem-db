description: |
  Rango proposes activating Stellar multi-chain interoperability by integrating the Stellar chain, along with its prominent, secure DEXs and bridges, into the Rango ecosystem. Crypto users, from novice to professional, will be able to swap any token from any chain to Stellar and vice versa with the best rates and lowest fees, all without changing interfaces. Rango's smart routing engine suggests optimized routes, allowing users to select their desired route based on outcome amount, network fees, and speed.
