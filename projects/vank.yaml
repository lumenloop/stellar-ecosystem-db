description: 'VANK is a multicurrency B2B payments platform for US-LatAm cross-border trade, processing over $115M in TPV across 40 enterprise clients. The company is building VANK Anchor: a Stellar-native USDC-COP on/off ramp for Colombia enabling COP deposits via PSE and USDC delivery to partner Stellar accounts (on-ramp), and USDC-to-COP disbursements via ACH/bank transfer with OFAC/PEP compliance screening (off-ramp), implemented via SEP-24, SEP-6, SEP-38, SEP-10, and SEP-1.'
