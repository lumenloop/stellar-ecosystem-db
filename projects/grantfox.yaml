description: |
  GrantFox is the new "OnlyDust" collaboration platform built exclusively for the Stellar ecosystem. It connects projects with technical contributors to accelerate ecosystem growth through transparent, high-quality contributions. As OnlyDust shifts away from Web3, many Stellar projects lost their contribution hub. GrantFox fills that gap, becoming the default space where Stellar projects gain visibility, attract contributors, and track progress, all seamlessly synced with GitHub. Projects can publish open issues, and manage requests from a same place. Builders can explore projects, apply to issues, and build verified on-chain reputation.
