description: Soroban-native yield-bearing payment protocol built by Bingtellar. Blink holds USDC in programmable escrow smart contracts where it earns DeFi yield (via Blend Capital and DeFindex) while in transit, then settles to recipients via email claim link, mobile money, or bank transfer — no public key required. Designed for remittances, NGO disbursements, payroll, and B2B payments across Africa, LatAm, and SE Asia.
