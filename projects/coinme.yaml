description: Coinme is a licensed U.S. cryptocurrency cash exchange founded in 2014, enabling cash on/off-ramps via 21,000+ physical kiosk locations through Coinstar and MoneyGram partnerships. It powers USDC-based P2P payments and remittances on Stellar, and offers a B2B Crypto-as-a-Service API for financial institutions seeking white-label cash-to-crypto capabilities.
