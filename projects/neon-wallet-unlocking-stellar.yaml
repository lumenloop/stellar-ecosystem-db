description: Neon Wallet is an established, non-custodial wallet designed to provide a seamless and secure experience for the cross-chain user. Available as a comprehensive suite of applications—including mobile, desktop, and a browser extension—Neon serves as a versatile and trusted gateway to the world of decentralized finance. Our platform offers robust, native support for the Neo ecosystem and major EVM networks, including Ethereum, Polygon, and Base. To empower users, Neon Wallet integrates essential financial tools directly into the interface, such as powerful cross-chain swap capabilities, fiat on/off-ramp services, and full dApp connectivity through WalletConnect. With a focus on simplifying user experience and ensuring top-tier security. Our mission is to continue breaking down the barriers between blockchain ecosystems, making Web3 more accessible and interoperable for everyone.
