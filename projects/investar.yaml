description: InveStar is a mobile-first remittance-to-investment platform built on Stellar that connects cross-border USDC transfers directly to brokerage accounts. Targeting the US/MENA–Bangladesh corridor, it enables diaspora users and freelancers to send money home via MoneyGram Ramps (SEP-24) while optionally routing a portion into Dhaka Stock Exchange (DSE) equities or US securities via Alpaca. Custodial Stellar USDC wallets, Horizon SSE event streaming, and a licensed tri-party DSE OMS integration power the remit-to-invest flywheel.
