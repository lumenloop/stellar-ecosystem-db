title: Institutional Liquidity Infrastructure for Stellar
other_names: null
parent: null
description: |-
  Lobster Protocol is a quantitative liquidity management platform for institutional clients. We build automated strategies combining liquidity pool optimization and cross-DEX arbitrage to improve liquidity efficiency and trading execution.

  Our infrastructure already operates on several EVM chains and generates revenue through B2B liquidity management services.  

  On Stellar, we have already developed a complete analytics and execution stack including:

  – a DEX indexer covering Soroswap, Aquarius and Phoenix

  – a proprietary analytics engine with AMM V2 pool scoring models

  – Soroban smart contracts for liquidity management and automated execution  

  The next step is enabling institutional capital to access Stellar liquidity markets.

  Through this integration we will connect our strategy engine with key Stellar ecosystem building blocks (Allbridge, Stellar Broker, DFNS, Stellar Wallets Kit), allowing institutional clients to deploy capital on Stellar DEXs seamlessly.  

  Our goal is to bring institutional liquidity, deeper pools and higher trading volumes to the Stellar DeFi ecosystem.
