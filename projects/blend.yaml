description: Blend is a decentralized finance (DeFi) protocol built on Stellar's Soroban smart contract platform, enabling users, DAOs, and institutions to create and manage lending pools with customizable assets and specifications. It offers permissionless deployment of isolated lending pools, ensuring security and capital efficiency without the need for centralized governance.
