description: |-
  Excited to introduce AXIS — smart contract limit orderbook backward-compatible with Classic Stellar DEX.  
  Key features:

    Off-chain matching + on-chain settlement, combining the best from both worlds.
      

    Maximum security: completely trustless model, non-upgradeable open-source contract, no admin access.
      
    Peace of mind with allowance-based orders — AXIS doesn't hold tokens, funds never leave user accounts.
      
    Extendable software architecture: a ready-to-use indexer that can be plugged in to any swap router or trading bot.
      
    Path-finding API that can be used as a drop-in replacement for Horizon, making the transition really fast.
      
    No trading fees — the protocol doesn't charge any commissions for order placement or trades.
      
    Advanced trading tools and APIs for CEX-like experience.
      
    Once deployed to Mainnet, the orderbook will be immediately available for trading on multiple trading platforms (like StellarTerm and StellarX) via StellarBroker swaps.
