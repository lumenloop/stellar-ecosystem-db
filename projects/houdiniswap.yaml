description: |
  Houdini Swap: The Frontend of Crypto  Houdini Swap is a leading non-custodial, cross-chain liquidity aggregator that unifies DEXs, aggregators, bridges, and centralized providers into one seamless interface. We empower users and partners with unmatched execution across 80+ networks and over 4.5 million route combinations.  Our platform offers two key transaction options:  Standard Swaps - Fast, secure, and efficient swaps using the best available rates across our extensive partner network.  Compliant Private Swaps - A unique offering that ensures AML-compliant privacy by breaking the on-chain link between sender and receiver-ideal for projects and users seeking confidentiality without compromising regulatory integrity.  With a robust API for plug-and-play integration, Houdini Swap is trusted by 30+ API partners and over 100 listing partners. We’re the go-to infrastructure for projects looking to scale user access, liquidity, and compliance-ready privacy.
