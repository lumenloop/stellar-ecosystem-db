description: Benji Investments is a platform developed by Franklin Templeton that allows investors to access tokenized securities and cryptocurrencies, including the Franklin OnChain U.S. Government Money Fund (FOBXX). This fund is natively issued on the Stellar blockchain, making it the first U.S.-registered mutual fund to process transactions and record share ownership on a public blockchain.
