description: 'Boundless is a Web3 platform built on the Stellar blockchain that manages and oversees funding activities such as crowdfunding, grants, and hackathons.  Our mission is simple: make funding, building, and collaboration in Web3 more open, accountable, and rewarding.  What makes Boundless unique is its milestone-based fund disbursement powered by the TrustlessWork API.'
