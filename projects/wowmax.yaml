description: WOWMAX is a multi-chain DEX aggregator and cross-chain bridge aggregator expanding to Stellar. It routes swaps across Stellar's DEXes (SDEX, Soroswap, Phoenix, Aquarius) via a modified A* algorithm for best-execution pricing, and aggregates cross-chain bridges (Near Intents, Allbridge, Axelar) for Stellar↔Ethereum and Stellar↔EVM transfers. Already live across 20+ EVM chains with $2B+ trading volume and 336,000+ unique traders, WOWMAX brings unified DeFi access and cross-chain liquidity to the Stellar ecosystem.
