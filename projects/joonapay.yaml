description: 'JoonaPay is an enterprise financial platform for Francophone West Africa (UEMOA region). We provide treasury management, payments, expense management, and accounting in one unified platform. Businesses in the region currently juggle 5-9 disconnected tools (banks, mobile money, ERPs, spreadsheets). We replace all of that with a single dashboard. Our goal: become the financial operating system for businesses in the CFA franc zone.'
