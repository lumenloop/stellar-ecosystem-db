description: Noether is a decentralized perpetual futures exchange built natively on Stellar/Soroban. It enables leveraged trading up to 10x (just for now) on crypto assets with limit orders, stop-loss, and take-profit functionality. Liquidity providers earn yield through the NOE-token vault system. Currently live on testnet with a complete trading interface, automated keeper infrastructure, and four production-ready smart contracts.
