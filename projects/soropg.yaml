description: SoroPG (Soroban Playground) is a browser-based web IDE for writing, testing, and deploying Soroban smart contracts on Stellar — no local CLI required. Features include a Monaco code editor, WASM compilation, wallet generation, contract deployment, function invocation, multi-file workspaces, GitHub URL loading, and local testnet support.
