description: DTCC is the premier post-trade market infrastructure for the global financial services industry, with over 50 years of experience automating, centralizing, and standardizing the processing of financial transactions across clearing, settlement, asset servicing, and data services. Through its DTC subsidiary, DTCC is enabling the tokenization of custodied assets on the Stellar network — targeting real-world assets such as Russell 1000 equities, ETFs, and U.S. Treasuries — with availability expected in H1 2027.
