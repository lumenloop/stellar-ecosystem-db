description: Pending transaction storage and multisig signature aggregator for Stellar Network. Stores unsigned or partially-signed transactions and coordinates multiple signers to meet signing thresholds, with auto-submit and callback support. Useful for escrow, derivatives, P2P lending, and other multisig-based workflows on Stellar.
