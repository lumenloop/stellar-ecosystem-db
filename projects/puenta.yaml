description: |
  KometPay is the app that helps Latino migrants to better support their families abroad. At its core, KometPay leverages blockchain to offer the most competitive international money transfer option - in terms of speed, cost and ease - between US and Colombia. We also empower recipients to hold and transact in USD (USDC) to mitigate local currency fluctuation and also with free and instant local transfers.
