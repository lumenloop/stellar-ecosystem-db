title: Regulated BRL Settlement for FX and Institutional Payments on Stellar
other_names: null
parent: null
description: |-
  BRLP is a regulated BRL settlement token issued on Stellar for institutional FX, institutional payments, and crypto-to-fiat reconciliation.  

  Today, crypto-to-fiat BRL settlement still depends on banking and fragmented OTC processes that are slow, expensive, and operationally opaque. Institutions face multi-day settlement cycles, intermediaries, and manual reconciliation.  

  BRLP represents confirmed fiat custody as an on-chain settlement unit. Tokens are minted only after BRL is received in a regulated account, transferred exclusively between authorized institutional counterparts, and burned on exit. On-chain supply always matches real-world custody, creating a shared and verifiable settlement record.  
    
  We're replacing bilateral reconciliation and delayed settlement with near-instant finality, deterministic auditability, and compliance-by-design. BRLP is not a retail stablecoin or a speculative asset. It is a settlement infrastructure, connecting Brazilian banking rails to modern on-chain coordination using Stellar’s native asset controls and fast finality.
