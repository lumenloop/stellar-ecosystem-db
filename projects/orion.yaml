description: A unified, semantic API that computes and serves a user’s total DeFi exposure across major Soroban protocols. The service ingests protocol state (Blend, Aquarius, Soroswap, FxDAO), normalizes positions into financial primitives (deposits, borrows, LP exposure, debt, yields), computes derived metrics (net exposure, health factor, risk signals), and provides real-time and historical position data via a performant REST interface. Orion enables wallets, dashboards, analytics tools, and risk engines to build consistent, accurate DeFi user experiences without reimplementing protocol logic.
