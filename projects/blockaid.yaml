description: Blockaid is an onchain security platform that provides real-time detection and response for Web3 builders and operators. The platform monitors, detects, and responds to fraud, scams, phishing, and exploits before they happen. Founded in 2022 by former Israeli cyber intelligence operatives, Blockaid is trusted by leading Web3 companies including Coinbase, MetaMask, Stellar, Polymarket, and World.org.
