description: |-
  CashAbroad is a programmable payments platform for manufacturers and logistics companies with global supply chains. Using stablecoin infrastructure, CashAbroad enables stablecoin payments in 4 hours versus 3–5 business days traditionally.

  The platform focuses on regulatory compliance, transparency, and competitive FX execution, reducing payment delays and FX friction. CashAbroad operates in the $900B Mexico–U.S. payment corridor, a major underserved trade route for SMEs.

  Customers process $50K to $200K per payment, typically based in the U.S. or Mexico with suppliers in China, Hong Kong, and Brazil. CashAbroad serves manufacturers and logistics operators needing faster, more reliable payment infrastructure than traditional banking.

  Following diagnostics during The Stellar Growth campaign, we identified key operational and technical needs. We request a $104,000 grant to support expansion and add 3-5 engineers. The phases below outline our execution roadmap.
