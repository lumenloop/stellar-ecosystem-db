description: |
  DigiBank aims to integrate SDP (Stellar Disbursement Platform) as a business line, enabling efficient mass payments for NGOs in unbanked regions. Partnering with the Stellar Foundation, we piloted SDP with GIZ Germany—Europe’s largest state development agency—and UOSSM to distribute $1M in salaries to 1K medical staff across 6 hospitals serving thousands of people daily. This reduced payment timelines from 3 months to 1 day, saved 500 hours monthly for finance/HR teams, and cut costs money transfer costs by 50%. Using Stellar’s blockchain, we enhance transparency and eliminate intermediaries. Our goal is to scale this solution across MENA, leveraging GIZ’s precedent to attract more NGOs, while improving DigiBank’s crypto-to-cash network.
