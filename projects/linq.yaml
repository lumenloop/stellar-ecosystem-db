description: Linq is a stablecoin payments app that lets users spend USDC and other stablecoins like cash directly from their crypto wallet, with real-time settlement to Nigerian bank accounts. Its B2B merchant gateway enables businesses to accept crypto payments via QR code — settling instantly in NGN — across Stellar, Sui, Solana, Base, BSC, and Aptos, requiring no crypto knowledge from merchants.
