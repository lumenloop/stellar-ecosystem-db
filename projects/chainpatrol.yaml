description: |
  ChainPatrol is a real-time Web3 security platform that detects, blocks, and takes down online threats targeting crypto users, such as phishing sites, fake social accounts, and impersonation attempts. Our system protects leading ecosystems like Consensys, Arbitrum, and Sui through proactive monitoring and takedown coverage across Discord, Slack, Telegram, and over 20 crypto wallets. With support from Stellar, we aim to expand this coverage to safeguard its ecosystem, boost user trust, and enable safer adoption.
