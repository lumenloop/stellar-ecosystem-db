description: |
  AirGap offers a robust, cost-effective solution by turning any smartphone into a secure cold wallet. AirGap consists of Wallet (hot wallet for transactions) and Vault (cold wallet for offline signing). Vault can also be used as a standalone solution with MetaMask for enhanced security.
