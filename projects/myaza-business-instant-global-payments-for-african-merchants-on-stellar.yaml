title: 'Myaza Business: Instant Global Payments for African Merchants on Stellar'
other_names: null
parent: null
description: |-
  Myaza Business enables African merchants to move money globally without bank delays by using USDC on the Stellar.

  Today, importers and cross-border businesses in Africa face 2–5 day delays, failed payments, and FX restrictions when paying global suppliers. These delays directly impact inventory restocking, sales cycles, and business growth.

  Myaza Business solves this by enabling merchants to:

    Pay global suppliers instantly using USDC on Stellar
      
    Receive international payments without delays
      
    Move funds across currencies in minutes instead of days
      
    Get paid in-store with USDC using Myaza POS
      

  This project focuses on driving real economic activity on Stellar by enabling high-frequency, high-volume business transactions, starting with importers in Lagos trade hubs and expanding across African markets.

  By shifting from consumer wallet usage to merchant payments, Myaza Business will significantly increase transaction volume, repeat usage, and active accounts on Stellar.
