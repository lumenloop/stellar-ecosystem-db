description: Yellow Card is a pan-African fintech company operating across 20 countries, providing secure and cost-effective methods for individuals and businesses to buy and sell cryptocurrencies like BTC, ETH, USDT, USDC, and PYUSD using local currencies. In 2024, Yellow Card integrated USD Coin (USDC) on the Stellar network, enabling users to conduct near-instant, low-cost cross-border transactions across Africa.
