title: ACTA
other_names: null
parent: null
description: |-
  ACTA is a Verifiable Credentials API/SDK on Stellar enabling startups, DAOs, and businesses to issue and verify trusted digital credentials making trust as seamless and transparent as a blockchain transaction. It replaces fragmented verification (manual proofs, siloed databases, and off-chain attestations) with reusable, independently verifiable credentials.  

  Our mission is to build a unified credentials ecosystem on Stellar by creating the official DID standard for the Stellar blockchain and using it as the core identity layer for every ACTA-issued credential, so issuers and holders are identified consistently and reputation is portable across apps.  
    
  ACTA anchors each credential’s hash on-chain via Soroban smart contracts with W3C VC aligned off-chain verification. Privacy is key: we are adding zero-knowledge proofs for selective disclosure, letting users prove claims without revealing underlying PII.  

  Focused on LATAM startup integrations today, ACTA is open-source and built to scale globally on Stellar’s trusted, efficient, low-cost network.
