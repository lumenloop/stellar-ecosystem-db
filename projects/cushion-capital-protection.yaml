description: Cushion provides non-custodial, capital-protected investment strategies designed to reduce downside risk for digital asset and RWA investors.    The project builds on-chain CPPI-based strategies that automatically rebalance between risky assets and stablecoins to preserve capital while maintaining market exposure.    Stellar is used for asset issuance, low-cost transactions, and transparent on-chain execution, enabling auditable strategies with full user custody.    Cushion introduces structured risk-management products to Stellar, broadening its DeFi offering and enabling new use cases for stablecoins and tokenized assets.
