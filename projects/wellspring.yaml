description: Wellspring is an institutional treasury management and payments platform enabling businesses to receive fiat and stablecoin payments, custody funds, earn yield (up to 12% APY), and move money globally from a single dashboard. Built on Stellar, it integrates USDC.xlm custody via Turnkey, fiat on/off-ramps through Bridge (a US-regulated Stellar Anchor), and on-chain yield generation via Blend's lending protocol.
