description: |-
  Wellspring is a treasury management and payments platform that enables individuals and businesses to earn yield on their assets and move money globally using stablecoins and fiat rails from a single, integrated dashboard. Our core infrastructure unifies yield-bearing treasury accounts, stablecoin rails, and payment flows into a single compliant platform.  

  We plan to expand our capabilities by adding native support for the Stellar network, enabling scalable fiat on- and off-ramps for USDC on Stellar and integrating Stellar-native DeFi vaults as yield-generating venues.  

  This expansion will deliver a purpose-built treasury management and payments solution for companies across the Stellar ecosystem, materially improving capital efficiency, liquidity management, and operational simplicity.
