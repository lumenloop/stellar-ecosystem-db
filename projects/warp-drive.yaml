description: |-
  WarpDrive is a high-security execution framework that brings verifiable off-chain automation to the Stellar ecosystem.

  WarpDrive integrates the proven WAVS (https://www.wavs.xyz/) execution model - WASM runtime backed by Eigenlayer AVS operator set - with Stellar and Soroban. It allows external services, bots, and demanding workloads such as cross chain orchestration, custom oracles, and GPU level computation to run with the same trust guarantees as on-chain logic.

  WarpDrive allows developers to build applications that interact with real-world data and execute advanced automation like prediction markets powered by custom oracles or automated treasury and trading strategies.

  Project development will conclude in a deployment of the first live prediction market powered by WarpDrive.
