description: |
  A wrapped asset protocol helping institutions turn any token held in qualified custody into a yield-generating wrapped asset (“Normal Token”), which can be deployed as liquidity across DEXs. This makes it possible for investors to trade any crypto asset from a single interface and create on-chain crypto index fund tokens — each representing a diversified basket of assets, transparently rebalanced and fully tradable on-chain.
