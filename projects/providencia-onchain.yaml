description: A public transparency and accountability platform bringing Providencia Island's (Colombia) sponsor-funded conservation investments on-chain via the Stellar Disbursement Platform. A joint venture between VIIO (payment infrastructure) and Climate Future (field operations), the platform features a live transparency dashboard, track attribution registry, and reconciliation proof pack — linking every disbursement to its on-chain Stellar transaction hash so sponsors, auditors, and community members can independently verify where each peso went.
