description: |-
  Opportunity: DeFi TVL is growing by 78% a year and projected to reach $1T by 2030. However, DeFi remains largely inaccessible due to its complexity, fragmentation, high risk, and lack of transparency.

  Solution: DeFi Yield Aggregator. Tezoro aggregates 2,000+ markets and keeps your assets in the top-yielding ones. Result: 8.3% net APY. To reduce risk, Tezoro lets users choose a risk level, diversifies assets across multiple markets, and leverages AI to monitor vaults 24/7.

  Stellar: Tezoro aggregates Stellar protocols and collects the highest yield across other chains and brings it to Stellar via bridge. Tezoro will also launch a token on Stellar.

  Benefits:

    Retail users, institutions, and DAOs can access the best DeFi yields directly on Stellar.
      
    Stellar quickly delivers the best DeFi opportunities available on the market to its users, increasing adoption, and TVL. This motivates teams to launch tokens and DeFi protocols on Stellar. Tezoro will prioritize Stellar-native protocols for Stellar users, ensuring maximum liquidity and yield within the ecosystem.
