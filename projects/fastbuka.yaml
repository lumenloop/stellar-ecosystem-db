description: Choppaddi (FKA FastBuka) is a blockchain-enabled food and grocery delivery platform built on the Stellar network that connect customers, vendors, and riders across Africa with instant top-ups, fast payments, crypto and local currency options, built-in dispute resolution, and task-based rewards, making delivery faster, fairer, and more inclusive.
