title: Coala Pay
other_names:
  - Coala Pay Billy Wallet
  - Anticipatory Aid on Soroban
parent: null
description: |
  Stellar is utilizing a unique payments platform to conduct group cash transfers and offramps using stable coins. This use case functions well where internet phone connectivity exists, and offramp providers are utilizing the Stellar ecosystem. In locations where offramp providers are scarce, and online connectivity challenged, Coala Pay will adapt the use of its Billy Wallet to facilitate last mile payments. In this instance, Billy will be brought onto mainnet to be compatible with Aid Assist, as an Aid Assist host. Coala Pay will utilize a QR code reconciliation system and vendor network to facilitate the last mile payments to Stellar Aid Assist transactions.
