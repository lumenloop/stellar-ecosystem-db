description: 'The Vision: Our goal is to deliver affordable on-chain credit to millions of smallholder farmers by establishing a microlending engine that leverages the ERC-4626 Vault Standard on the Soroban smart contract platform, designed to unlock last-mile financing. The Objectives: - Provide direct access to credit to our existing 50,000 farmer base. This creates a sustainable and inclusive financial ecosystem, positioning the platform (microlending engine) as a viable pathway to bridge the agricultural financing gap while accelerating rural economic growth. - Enable other financial institutions, cooperatives, and lending entities to deploy and manage their instance of the microlending engine, thereby expanding their outreach through low-cost, transparent on-chain microlending. - Leverage Stellar’s transparent, scalable infrastructure and smart contract platform Soroban to ensure low-cost transactions, trust, and interoperability. Technical Implementation: The full technical implementation can be found on this link -> https://mugane-dev.notion.site/MicroVaulr-ma-kro-v-lt-pronounced-MicroVault-Powering-microlending-on-the-Stellar-Networ-24f974c54ae180daa057ee7dbd4068cf?pvs=143 and this Google Drive link as the backup -> https://drive.google.com/drive/folders/1RnekWppQBgjSuVFO10JkrDOSgs8IYX?usp=sharing.'
