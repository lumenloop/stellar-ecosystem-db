description: |
  We’re building the first complete payment adapter ecosystem for modern web developers—making USDC on Stellar usable in real SaaS, AI, and infra applications without requiring any blockchain knowledge.  Instead of asking developers to learn Stellar, we integrate Stellar directly into the tools they already use: BetterAuth, Clerk, Convex, Medusa, Trigger.dev, UploadThing, and the Vercel AI SDK.  Each adapter removes friction, automatically creates Stellar accounts, and makes USDC the default payment rail for:  Usage-based billing  Metered AI workflows  File uploads & storage  B2B SaaS monetization  With this adapter-first approach, we aim to turn Stellar into the invisible financial backbone of the modern web.
