title: PG Atlas
other_names:
  - 'Building the Backbone: SCF Public Goods'
parent: null
description: |-
  PG Atlas is the objective, transparent metrics backbone for the SCF Public Goods Maintenance program. Its primary role is to shift public goods funding decisions from noisy, subjective signals to verifiable, data-driven insights by quantifying adoption, criticality, reliability, security/quality, and decentralization (risk) across open-source tools, libraries, explorers, RPC infrastructure, SDKs, and other foundational components in the Stellar/Soroban ecosystem.

  By providing a live dependency graph, transitive impact scoring, pony factor analysis, and an active subgraph projection, PG Atlas directly powers the Metric Gate in the proposed funding decision stack and supplies off-chain context for NQG-weighted voting in the community-led Public Goods decentralization pilot.

  PG Atlas:

    Reduces systemic risk
      
    Improves funding efficiency
      
    Enhances legitimacy & decentralization
      
    Accelerates ecosystem growth.
