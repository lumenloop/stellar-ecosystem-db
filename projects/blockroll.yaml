description: Blockroll is Nigeria's first stablecoin wealth platform on Stellar, combining USDC payments, on-chain yield via DeFindex vaults, and a Visa card funded from Stellar USDC balances. Nigerian freelancers can receive international fiat (USD, EUR, GBP) directly into USDC via Bridge virtual accounts, earn yield on idle savings, and off-ramp to NGN via SEP-24 anchors (Linkio). All user wallets are Stellar-native MPC accounts provisioned via DFNS.
