title: PayQin
other_names:
  - 'PayQin: Blockchain made simple'
parent: null
description: |
  PayQin is a financial platform offering a USD wallet powered by USDC on the Stellar network, tailored to users in emerging markets. Our platform allows users to store, send, and receive funds seamlessly, providing a reliable alternative for those in cash-dependent economies. Through our integration with MoneyGram, users can fund their wallets in over 183 countries, making cross-border transactions faster, easier, and more affordable. By leveraging the Stellar network's low transaction fees and speed, PayQin brings financial inclusion to underserved markets, empowering users with modern financial tools.
