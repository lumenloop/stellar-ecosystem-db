title: Sava
other_names:
  - 'Sava: Stablecoin Savings for Turkey'
parent: null
description: Sava is a non-custodial savings app built on Stellar for Turkish users. It lets users deposit Turkish Lira, earn returns on USDC through Blend Protocol lending pools, and see everything denominated in ₺. Users sign in with email — Privy automatically creates a self-custodial Stellar wallet with no seed phrases needed. Mercuryo handles TRY-to-USDC conversion inside the app. The experience mirrors a savings account rather than a DeFi dashboard, targeting the 25M+ Turks who already hold crypto as a hedge against Lira inflation.
