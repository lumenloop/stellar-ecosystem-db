description: Fiatsend is a Stellar-powered payment infrastructure platform for Africa's digital economy. It provides a B2B console for merchants to create payment links, generate QR codes, and execute bulk payouts via the Stellar Disbursement Platform, alongside a consumer app enabling payments in local currency or stablecoins. Built for platforms disbursing at scale, Fiatsend settles USDC payments to local currencies through African anchors in under 10 seconds.
