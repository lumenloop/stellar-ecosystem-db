title: XCCY
other_names:
  - 'XCCY: Fixed-Rate Layer on Stellar'
parent: null
description: 'XCCY is a decentralized protocol enabling fixed income markets on Stellar (Soroban) and EVM chains, powered by on-chain interest rate swaps (IRS). It lets users lock deposit yields and loan costs, hedging variable rate volatility. Core products include Lock Yield (fixed-rate deposits and loans), IRS trading (move from floating to fixed with one swap), and XLP (vault-based liquidity layer). Live on Ethereum, Arbitrum, and Polygon since January 2026; Stellar/Soroban implementation underway via SCF #43 grant.'
