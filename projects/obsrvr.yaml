description: |
  Flow is a data indexing solution that lets Stellar data be received, changed, and sent to external data stores in real time. Flow builds up the Composable Data Platform, the next generation data-access platform on Stellar. With an open-source cli component and a managed service through Obsrvr. Flow lets developers make custom workflows based on blockchain data, which makes sure that data flows smoothly into their applications or analytical systems.   The components that make up the solution are: Publicly available datasets for Mainnet, Testnet and Futurenet created using Stellar Galexie (requester pays), CLI indexer that can be self hosted,  SaaS offering with shared and dedicated options
