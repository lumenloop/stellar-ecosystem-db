description: Velo is a Web3 financial protocol built on the Stellar network that bridges traditional finance and decentralized infrastructure. It operates the Federated Credit Exchange (FCX) for digital credit issuance, issues the USDV stablecoin backed by tokenized U.S. Treasury Bills, and enables cross-border payments, remittances, and merchant crypto acceptance through its Orbit platform.
